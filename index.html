
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 14px 20px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 10px;
    background: #0f0f0f;
  }

  header h1 { font-size: 16px; font-weight: 500; color: #e8e8e8; }

  #setup {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; gap: 16px; padding: 24px;
  }
  #setup p { font-size: 14px; color: #888; text-align: center; max-width: 360px; }
  #setup input {
    width: 100%; max-width: 400px; padding: 12px 16px;
    background: #1a1a1a; border: 1px solid #333; border-radius: 10px;
    color: #e8e8e8; font-size: 15px; outline: none;
  }
  #setup input:focus { border-color: #555; }
  #setup button {
    padding: 11px 28px; background: #e8e8e8; color: #0f0f0f;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer;
  }

  #chat { display: none; flex-direction: column; flex: 1; overflow: hidden; }

  #messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .msg { display: flex; flex-direction: column; gap: 4px; max-width: 80%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .msg-label { font-size: 11px; color: #555; padding: 0 4px; }
  .msg-bubble {
    padding: 10px 14px; border-radius: 14px; font-size: 15px;
    line-height: 1.6; white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .msg-bubble { background: #1e1e1e; border: 1px solid #2a2a2a; }
  .msg.assistant .msg-bubble { background: #161616; border: 1px solid #222; }

  .msg-image { max-width: 260px; border-radius: 10px; margin-top: 6px; border: 1px solid #2a2a2a; }
  .msg-file-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 8px;
    padding: 6px 10px; font-size: 13px; color: #aaa; margin-top: 6px;
  }

  .typing-dots { display: flex; gap: 5px; padding: 14px; }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: #444; animation: pulse 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,80%,100% { opacity:.2; } 40% { opacity:1; } }

  /* attachment preview strip */
  #attachments {
    display: none; flex-wrap: wrap; gap: 8px;
    padding: 10px 16px 0; background: #0f0f0f;
  }
  .att-chip {
    display: flex; align-items: center; gap: 6px;
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px;
    padding: 5px 10px; font-size: 13px; color: #aaa;
  }
  .att-chip img { width: 28px; height: 28px; object-fit: cover; border-radius: 4px; }
  .att-chip button {
    background: none; border: none; color: #555; cursor: pointer;
    font-size: 16px; line-height: 1; padding: 0 2px;
  }
  .att-chip button:hover { color: #e8e8e8; }

  #input-area {
    padding: 10px 16px 14px; border-top: 1px solid #222;
    display: flex; gap: 8px; align-items: flex-end; background: #0f0f0f;
  }

  #attach-btn {
    width: 40px; height: 40px; flex-shrink: 0;
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px;
    color: #888; cursor: pointer; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .15s;
  }
  #attach-btn:hover { border-color: #444; color: #e8e8e8; }

  #input {
    flex: 1; background: #1a1a1a; border: 1px solid #2a2a2a;
    border-radius: 12px; color: #e8e8e8; font-size: 15px;
    font-family: inherit; padding: 10px 14px; resize: none; outline: none;
    line-height: 1.5; max-height: 160px; overflow-y: auto;
  }
  #input:focus { border-color: #3a3a3a; }

  #send {
    width: 40px; height: 40px; background: #e8e8e8; border: none;
    border-radius: 10px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .15s;
  }
  #send:disabled { opacity: .3; cursor: default; }
  #send svg { width: 18px; height: 18px; }

  #clear-btn {
    background: none; border: none; color: #444; font-size: 12px;
    cursor: pointer; padding: 4px 8px; border-radius: 6px;
  }
  #clear-btn:hover { color: #888; }
</style>
</head>
<body>

<header>
  <h1>Claude Chat</h1>
  <button id="clear-btn" style="margin-left:auto; display:none;" onclick="clearChat()">wyczyść</button>
</header>

<div id="setup">
  <p>Wklej swój klucz API z <strong style="color:#e8e8e8;">console.anthropic.com</strong></p>
  <input type="password" id="key-input" placeholder="sk-ant-..." />
  <button onclick="startChat()">Rozpocznij</button>
</div>

<div id="chat">
  <div id="messages"></div>

  <div id="attachments"></div>

  <div id="input-area">
    <button id="attach-btn" title="Dodaj plik" onclick="document.getElementById('file-input').click()">+</button>
    <input type="file" id="file-input" accept="image/jpeg,image/png,image/gif,image/webp,text/plain,text/markdown,.md" multiple style="display:none" onchange="handleFiles(this.files)">
    <textarea id="input" rows="1" placeholder="Napisz wiadomość... (Enter = wyślij)"></textarea>
    <button id="send" onclick="send()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0f0f0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
let API_KEY = '';
let history = [];
let pendingAttachments = []; // [{type, name, mediaType, data}]

function startChat() {
  const key = document.getElementById('key-input').value.trim();
  if (!key.startsWith('sk-')) { alert('Nieprawidłowy klucz — powinien zaczynać się od sk-'); return; }
  API_KEY = key;
  localStorage.setItem('claude_key', key);
  document.getElementById('setup').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';
  document.getElementById('clear-btn').style.display = 'block';
  document.getElementById('input').focus();
}

window.onload = () => {
  const saved = localStorage.getItem('claude_key');
  if (saved) document.getElementById('key-input').value = saved;
};

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});

// drag & drop na cały chat
document.getElementById('chat').addEventListener('dragover', e => e.preventDefault());
document.getElementById('chat').addEventListener('drop', e => {
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
});

async function handleFiles(files) {
  for (const file of files) {
    const isImage = file.type.startsWith('image/');
    const isText = file.type.startsWith('text/') || file.name.endsWith('.md');
    if (!isImage && !isText) { alert(`Nieobsługiwany typ: ${file.name}`); continue; }

    const data = await readFile(file, isImage ? 'base64' : 'text');
    pendingAttachments.push({ type: isImage ? 'image' : 'text', name: file.name, mediaType: file.type || 'text/plain', data });
    renderChip(pendingAttachments.length - 1, file, isImage, data);
  }
  document.getElementById('file-input').value = '';
}

function readFile(file, mode) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => {
      if (mode === 'base64') res(r.result.split(',')[1]);
      else res(r.result);
    };
    r.onerror = rej;
    if (mode === 'base64') r.readAsDataURL(file);
    else r.readAsText(file);
  });
}

function renderChip(idx, file, isImage, data) {
  const strip = document.getElementById('attachments');
  strip.style.display = 'flex';
  const chip = document.createElement('div');
  chip.className = 'att-chip';
  chip.dataset.idx = idx;
  if (isImage) {
    const img = document.createElement('img');
    img.src = 'data:' + file.type + ';base64,' + data;
    chip.appendChild(img);
  } else {
    chip.innerHTML = '📄 ';
  }
  const name = document.createElement('span');
  name.textContent = file.name.length > 20 ? file.name.slice(0,18)+'…' : file.name;
  const rm = document.createElement('button');
  rm.textContent = '×';
  rm.onclick = () => removeAttachment(idx, chip);
  chip.appendChild(name);
  chip.appendChild(rm);
  strip.appendChild(chip);
}

function removeAttachment(idx, chip) {
  pendingAttachments[idx] = null;
  chip.remove();
  if (!document.querySelectorAll('.att-chip').length) {
    document.getElementById('attachments').style.display = 'none';
  }
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addMessage(role, text, attachments) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  let inner = `<div class="msg-label">${role === 'user' ? 'Ty' : 'Claude'}</div>`;

  if (attachments && attachments.length) {
    attachments.forEach(a => {
      if (a.type === 'image') {
        inner += `<img class="msg-image" src="data:${a.mediaType};base64,${a.data}" alt="${escHtml(a.name)}">`;
      } else {
        inner += `<div class="msg-file-badge">📄 ${escHtml(a.name)}</div>`;
      }
    });
  }

  if (text) inner += `<div class="msg-bubble">${escHtml(text)}</div>`;
  el.innerHTML = inner;
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ block: 'end' });
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'msg assistant'; el.id = 'typing';
  el.innerHTML = '<div class="msg-label">Claude</div><div class="typing-dots"><span></span><span></span><span></span></div>';
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ block: 'end' });
}
function removeTyping() { const el = document.getElementById('typing'); if (el) el.remove(); }

async function send() {
  const inputEl = document.getElementById('input');
  const text = inputEl.value.trim();
  const atts = pendingAttachments.filter(Boolean);
  if (!text && !atts.length) return;
  if (document.getElementById('send').disabled) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  document.getElementById('send').disabled = true;

  // clear attachment strip
  pendingAttachments = [];
  document.getElementById('attachments').innerHTML = '';
  document.getElementById('attachments').style.display = 'none';

  addMessage('user', text, atts);

  // build content array for API
  const content = [];
  atts.forEach(a => {
    if (a.type === 'image') {
      content.push({ type: 'image', source: { type: 'base64', media_type: a.mediaType, data: a.data } });
    } else {
      content.push({ type: 'text', text: `[Plik: ${a.name}]\n${a.data}` });
    }
  });
  if (text) content.push({ type: 'text', text });

  history.push({ role: 'user', content });
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, messages: history })
    });

    const data = await res.json();
    removeTyping();
    if (data.error) throw new Error(data.error.message);

    const reply = data.content[0].text;
    history.push({ role: 'assistant', content: reply });
    addMessage('assistant', reply);
  } catch (err) {
    removeTyping();
    addMessage('assistant', '⚠️ Błąd: ' + err.message);
  }

  document.getElementById('send').disabled = false;
  inputEl.focus();
}

function clearChat() {
  history = [];
  pendingAttachments = [];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('attachments').innerHTML = '';
  document.getElementById('attachments').style.display = 'none';
}
</script>
</body>
</html>
